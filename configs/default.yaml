data:
  dataset_name: "Cora"
  data_dir: "data"
  train_split: 0.6
  val_split: 0.2
  test_split: 0.2
  random_split: true
  normalize_features: true

diffusion:
  method: "ppr"
  alpha: 0.15
  eps: 0.01
  self_loop_weight: 1.0
  normalization_in: "sym"
  normalization_out: "col"
  sparsification_method: "threshold"
  topk_k: 64

model:
  model_type: "gcn"
  hidden_channels: 64
  num_layers: 2
  dropout: 0.5
  activation: "relu"
  use_batch_norm: false
  use_residual: false
  cached: true

training:
  lr: 0.01
  weight_decay: 5e-4
  epochs: 200
  patience: 50
  batch_size: 1
  early_stopping: true
  save_best: true
  checkpoint_dir: "checkpoints"
  optimizer: "adam"
  scheduler: "plateau"
  log_interval: 20

experiment:
  seed: 42
  device: "auto"
  log_level: "INFO"
  use_wandb: false
  project_name: "graph_diffusion"
  experiment_name: "default"
  tags: []
